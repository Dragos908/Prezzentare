name: prezentare_interactiva
description: Sistem de prezentare pentru table interactive
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core:     ^2.27.0
  firebase_database: ^10.4.0

  # UI & Animații
  flutter_animate:   ^4.5.0
  go_router:         ^13.0.0

  # Web (iFrame Canva / Google Slides)
  webview_flutter:         ^4.7.0
  webview_flutter_web:     ^0.2.2

  # Audio
  audioplayers:      ^6.0.0

  # Utilitare
  shared_preferences: ^2.2.0
  connectivity_plus:  ^6.0.0
  flutter_bloc:       ^8.1.4
  equatable:          ^2.0.5

  web: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/

